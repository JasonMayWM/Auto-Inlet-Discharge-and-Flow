<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Workout History - Workout App</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header>
        <h1>Workout Tracker</h1>
        <nav>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="exercises.html">Manage Exercises</a></li>
                <li><a href="routines.html">Manage Routines</a></li>
                <li><a href="log_workout.html">Log Workout</a></li>
                <li><a href="history.html">Workout History</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section id="workout-history-section">
            <h2>Your Workout History</h2>
            <div id="history-table-container"> <!-- Renamed for clarity -->
                <table id="history-table">
                    <thead>
                        <tr>
                            <th>Date</th>
                            <th>Type</th>
                            <th>Name</th>
                            <th>Sets</th>
                            <th>Reps</th>
                            <th>Weight (kg)</th>
                            <th>Duration (min)</th>
                            <th>Notes</th>
                        </tr>
                    </thead>
                    <tbody id="history-list"> <!-- Keep ID for JS compatibility, though it's a tbody now -->
                        <!-- Workout history will be populated here by JavaScript -->
                        <tr><td colspan="8">Loading history...</td></tr>
                    </tbody>
                </table>
            </div>
            <div id="history-message" class="message-area"></div>
        </section>
    </main>

    <footer>
        <p>&copy; 2024 Workout App</p>
    </footer>

    <script src="js/history.js"></script>
</body>
</html>
